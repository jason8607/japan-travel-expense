name: Cashback Alert Cron

# Pings /api/cron/cashback-alert once daily. The endpoint checks each user's
# credit-card spending against their cashback_limit and fires a push notification
# when they cross the 80% or 100% threshold.
#
# Runs at 01:05 UTC = 09:05 JST / 09:05 CST — morning check before the day's shopping.
# The endpoint deduplicates via the cashback_notifications table (25-hour window)
# so users never receive the same alert twice in a row.
#
# Required configuration (set once in GitHub repo settings):
#   Settings > Secrets and variables > Actions
#     - Variable APP_URL      (e.g. https://travelio.vercel.app, no trailing slash)
#     - Secret   CRON_SECRET  (must match the CRON_SECRET set in Vercel project env)

on:
  schedule:
    - cron: "5 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cashback-alert
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger cashback-alert endpoint
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -u
          if [ -z "${APP_URL:-}" ]; then
            echo "::error::Missing repo variable APP_URL"
            exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Missing repo secret CRON_SECRET"
            exit 1
          fi

          response=$(mktemp)
          status=$(curl -sS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            -o "${response}" \
            -w "%{http_code}" \
            "${APP_URL%/}/api/cron/cashback-alert")

          echo "HTTP ${status}"
          echo "Body:"
          cat "${response}"
          echo

          if [ "${status}" != "200" ]; then
            echo "::error::cashback-alert endpoint returned non-200"
            exit 1
          fi
